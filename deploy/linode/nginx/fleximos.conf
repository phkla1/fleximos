# Fleximotion suite behind nginx.
# Replace fleximos.example.com with your domain (or the Linode IP for IP-only access).
server {
    listen 80;
    server_name fleximos.example.com;

    # Static frontends are served straight from the repository checkout.
    root /srv/fleximos;
    index index.html;

    # Landing page: the developer portal doubles as the suite directory.
    location = / {
        return 302 /apps/developer-portal/;
    }

    location /apps/ {
        try_files $uri $uri/ =404;
    }

    location /api-contracts/ {
        try_files $uri =404;
    }

    location /docs/ {
        default_type text/plain;
        try_files $uri =404;
    }

    # Backend services. The frontends resolve these same-origin routes
    # automatically when they are not running on localhost.
    location /services/foundation/ {
        proxy_pass http://127.0.0.1:4010/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /services/ops/ {
        proxy_pass http://127.0.0.1:4030/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 8m;   # camera media uploads
    }

    location /services/payments/ {
        proxy_pass http://127.0.0.1:4040/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
