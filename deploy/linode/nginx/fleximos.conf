# OPTIONAL nginx layer for Fleximotion.
#
# The suite is fully usable without nginx: the fleximos-frontend user service
# serves everything (frontends + /services proxies) on port 8080. Add nginx
# only when you want a domain on standard ports with TLS — installing it and
# writing to /etc/nginx requires sudo.
#
# Install:
#   sudo cp ~/fleximos/deploy/linode/nginx/fleximos.conf /etc/nginx/sites-available/fleximos.conf
#   sudo ln -sf /etc/nginx/sites-available/fleximos.conf /etc/nginx/sites-enabled/fleximos.conf
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace fleximos.example.com with your domain first.
server {
    listen 80;
    server_name fleximos.example.com;

    # Everything — static frontends and /services/* API routes — is handled by
    # the fleximos-frontend user service. One proxy rule covers the suite.
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 8m;   # camera media uploads
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
